<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美容室CLanからの挑戦状</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 設定画面 -->
    <div class="settings-overlay" id="settings-screen">
        <div class="settings-content">
            <h1 class="settings-title">設定</h1>
            
            <div class="settings-section">
                <div class="settings-subtitle">テーマを選択</div>
                <div class="theme-buttons">
                    <button class="theme-btn" id="theme-darkblue" onclick="setTheme('darkblue')">
                        <span class="theme-name">Dark Blue</span>
                        <span class="theme-desc">ネオン調</span>
                    </button>
                    <button class="theme-btn" id="theme-foldercolor" onclick="setTheme('foldercolor')">
                        <span class="theme-name">Folder Color</span>
                        <span class="theme-desc">パステル調</span>
                    </button>
                </div>
            </div>

            <div class="settings-section">
                <button class="settings-btn-back" onclick="backToMenuFromSettings()">メニューに戻る</button>
            </div>
        </div>
    </div>

    <!-- メニュー画面 -->
    <div class="menu-overlay" id="menu-screen">
        <div class="menu-content">
            <h1 class="menu-title">美容室CLan<br>からの挑戦状</h1>
            
            <div class="menu-section">
                <div class="menu-subtitle">難易度を選択</div>
                <div class="menu-difficulty-buttons">
                    <button class="menu-btn easy" onclick="startGameWithDifficulty('easy')">初級</button>
                    <button class="menu-btn normal" onclick="startGameWithDifficulty('normal')">中級</button>
                    <button class="menu-btn hard" onclick="startGameWithDifficulty('hard')">上級</button>
                    <button class="menu-btn expert" onclick="startGameWithDifficulty('expert')">最高級</button>
                </div>
            </div>

            <div class="menu-section">
                <label class="menu-label">
                    <input type="checkbox" id="menu-miss-mode" onchange="updateMenuSettings()">
                    ミス制限モード（3ミスでゲームオーバー）
                </label>
            </div>

            <div class="menu-section">
                <div class="menu-subtitle">ハイスコア</div>
                <div class="menu-highscores" id="menu-highscores"></div>
            </div>

            <div class="menu-section">
                <div class="menu-subtitle">統計情報</div>
                <div class="menu-stats" id="menu-stats"></div>
                <button class="menu-btn-small" onclick="resetAllStats()">統計情報をリセット</button>
            </div>

            <div class="menu-section">
                <button class="menu-btn-small" onclick="openSettings()">⚙️ 設定</button>
            </div>

            <div class="menu-section">
                <button class="menu-btn-start" onclick="closeMenuAndStartGame()">ゲームを開始</button>
            </div>

            <div class="menu-section">
                <button class="menu-btn-small" onclick="openSettings()">⚙️ 設定</button>
            </div>
        </div>
    </div>

    <!-- 設定画面 -->
    <div class="settings-overlay" id="settings-screen" style="display:none;">
        <div class="settings-content">
            <h2 class="settings-title">⚙️ 設定</h2>
            
            <div class="settings-section">
                <div class="settings-subtitle">テーマ選択</div>
                <div class="theme-selector" id="theme-selector"></div>
            </div>

            <div class="settings-section">
                <button class="settings-btn-back" onclick="closeSettingsMenu()">メニューに戻る</button>
            </div>
        </div>
    </div>

    <!-- ゲーム画面 -->
    <div class="game-container" id="game-container" style="display:none;">

    <h1 id="main-title">美容室CLan<br>からの挑戦状</h1>
    
    <div class="controls">
        <div class="control-buttons">
            <button class="btn" id="mode-toggle">問題を確定してプレイ開始</button>
            <button class="btn btn-undo" id="btn-undo" disabled>戻す</button>
            <button class="btn btn-reset" id="btn-reset">リセット</button>
            <button class="btn btn-clear" id="btn-clear">全部消去</button>
            <button class="btn btn-menu" id="btn-menu" onclick="backToMenu()">メニュー</button>
        </div>

        <div class="gen-area" id="gen-area" style="display:none;">
            <div class="gen-title">-- 自動生成  難易度選択 --</div>
            <div class="gen-buttons">
                <button class="btn-gen easy" onclick="generateSudoku('easy')">初級</button>
                <button class="btn-gen normal" onclick="generateSudoku('normal')">中級</button>
                <button class="btn-gen hard" onclick="generateSudoku('hard')">上級</button>
                <button class="btn-gen expert" onclick="generateSudoku('expert')">最高級</button>
            </div>
            <div class="best-time-list" id="best-time-list"></div>
            <div class="miss-mode-toggle">
                <button class="btn-miss-toggle" id="btn-miss-toggle" onclick="toggleMissLimitMode()">ミス制限モード: OFF</button>
            </div>
        </div>

        <div class="save-load-area" id="save-area">
            <div class="save-load-title">お気に入りマネージャー</div>
            <div class="slot-group">
                <button class="btn btn-save" onclick="savePuzzleCustom()">お気に入り保存</button>
                <button class="btn btn-load" onclick="openLoadModal()">一覧から読込</button>
            </div>
        </div>

        <div class="mode-status" id="mode-text">MODE: 問題を入力中</div>

        <div class="miss-counter" id="miss-counter" style="display:none;">MISS: <span id="miss-count">0</span> / <span id="miss-max">3</span></div>
        
        <div class="timer-container">
            <div class="timer" id="timer-display">00:00</div>
            <button class="btn btn-pause" id="btn-pause" onclick="pauseGame()">PAUSE</button>
            <button class="btn btn-hint" id="btn-hint" onclick="useHint()" style="display:none;">ヒント: <span id="hint-count">0</span>/<span id="hint-max">3</span></button>
        </div>
        
        <div class="error-message" id="error-text"></div>
    </div>

    <div class="grid-wrapper">
        <div class="grid" id="sudoku-grid"></div>
        <div class="pause-overlay" id="pause-screen">
            <div class="pause-title">PAUSED</div>
            <button class="btn-resume" onclick="resumeGame()">RESUME</button>
        </div>
    </div>

    <div class="keypad-container" id="num-pad-area">
        <div class="memo-pad">
            <div class="pad-title memo">MEMO</div>
            <button class="btn-memo-num" onclick="pressMemoNumber(1)">1</button>
            <button class="btn-memo-num" onclick="pressMemoNumber(2)">2</button>
            <button class="btn-memo-num" onclick="pressMemoNumber(3)">3</button>
            <button class="btn-memo-num" onclick="pressMemoNumber(4)">4</button>
            <button class="btn-memo-num" onclick="pressMemoNumber(5)">5</button>
            <button class="btn-memo-num" onclick="pressMemoNumber(6)">6</button>
            <button class="btn-memo-num" onclick="pressMemoNumber(7)">7</button>
            <button class="btn-memo-num" onclick="pressMemoNumber(8)">8</button>
            <button class="btn-memo-num" onclick="pressMemoNumber(9)">9</button>
            <button class="btn-memo-clear" onclick="clearMemo()">メモを消す</button>
        </div>

        <div class="main-pad">
            <div class="pad-title main">INPUT</div>
            <button class="num-btn" id="btn-num-1" onclick="pressMainNumber(1)">1<span class="num-count" id="count-1">0/9</span></button>
            <button class="num-btn" id="btn-num-2" onclick="pressMainNumber(2)">2<span class="num-count" id="count-2">0/9</span></button>
            <button class="num-btn" id="btn-num-3" onclick="pressMainNumber(3)">3<span class="num-count" id="count-3">0/9</span></button>
            <button class="num-btn" id="btn-num-4" onclick="pressMainNumber(4)">4<span class="num-count" id="count-4">0/9</span></button>
            <button class="num-btn" id="btn-num-5" onclick="pressMainNumber(5)">5<span class="num-count" id="count-5">0/9</span></button>
            <button class="num-btn" id="btn-num-6" onclick="pressMainNumber(6)">6<span class="num-count" id="count-6">0/9</span></button>
            <button class="num-btn" id="btn-num-7" onclick="pressMainNumber(7)">7<span class="num-count" id="count-7">0/9</span></button>
            <button class="num-btn" id="btn-num-8" onclick="pressMainNumber(8)">8<span class="num-count" id="count-8">0/9</span></button>
            <button class="num-btn" id="btn-num-9" onclick="pressMainNumber(9)">9<span class="num-count" id="count-9">0/9</span></button>
            <button class="num-btn clear-btn" onclick="pressMainNumber(0)">マスを空にする</button>
        </div>
    </div>

    <div class="modal-overlay" id="load-modal">
        <div class="modal-content">
            <div class="modal-title">SAVE DATA</div>
            <div class="save-list" id="modal-save-list"></div>
            <button class="btn-modal-close" onclick="closeLoadModal()">閉じる</button>
        </div>
    </div>

    <div class="clear-overlay" id="clear-screen">
        <div class="clear-content">
            <div class="clear-title">CLEAR!</div>
            <div class="clear-msg">
                おめでとうございます！<br>
                素晴らしいロジックでした！<br>
                タイム: <span id="final-time" style="color: #ffffff; font-size: 0.9rem; display: block; margin-top: 12px;">00:00</span>
                <span id="best-time-update" class="best-time-update" style="display:none;">🏆 ベストタイム更新！</span>
            </div>
            <button class="clear-btn-close" onclick="closeClearScreen()">CLOSE</button>
        </div>
    </div>

    <div class="gameover-overlay" id="gameover-screen">
        <div class="gameover-content">
            <div class="gameover-title">GAME OVER</div>
            <div class="gameover-msg">
                ミスが上限に達しました…<br>
                また挑戦してみましょう！<br>
                タイム: <span id="gameover-time" style="color: #ffffff; font-size: 0.9rem; display: block; margin-top: 12px;">00:00</span>
            </div>
            <button class="gameover-btn-retry" onclick="retryAfterGameOver()">もう一度</button>
        </div>
    </div>

    </div><!-- game-container 終了 -->
    <script src="app.js"></script>
</body>
</html>
